<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK-ULTRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            background: radial-gradient(circle, #ffffff 40%, #e2e2e2 100%);
            color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 450vh; /* Expanded scroll canvas for the macro sequence */
            overflow-x: hidden;
        }

        .scroller-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            perspective: 1500px;
        }

        /* Hero Wrapper */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: 46% 38%; /* Targets the precise coordinates of the elk's eye */
            will-change: transform, opacity, filter;
            transition: filter 0.1s ease-out;
        }

        /* Wood Frame */
        .frame {
            width: 240px;
            height: 300px;
            background: #ffffff; 
            border: 14px solid #1c120c;
            box-shadow: 0 40px 70px rgba(0,0,0,0.25), inset 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .elk-image {
            width: 110%;
            height: 110%;
            object-fit: contain;
            object-position: bottom center;
            filter: contrast(1.15) brightness(0.9) grayscale(0.15);
            position: absolute;
            bottom: -5px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 14px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            padding-left: 14px;
            color: #000000;
            transition: opacity 0.2s ease-out;
        }

        /* Surreal Close-up Macro Deer Eye Overlay */
        .macro-eye-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.5);
            will-change: opacity, transform, filter;
            pointer-events: none;
        }

        .macro-eye-svg {
            width: 500px;
            height: 500px;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.3));
        }

        /* Party Text Layout */
        .info-container {
            position: absolute;
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 28px;
            pointer-events: auto;
            z-index: 10;
        }

        .info-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0;
            filter: blur(20px);
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            color: #000000;
        }

        .info-line.reveal {
            opacity: 1;
            filter: blur(0px);
            transform: translateY(0);
        }

        /* The Final Clink Sequence */
        .clink-universe {
            position: absolute;
            bottom: 12%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .clink-universe.active {
            opacity: 1;
            transform: translateY(0);
        }

        .martini-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 400px;
            height: 220px;
            position: relative;
            margin-bottom: 40px;
        }

        /* Geometric Art Deco Glasses */
        .glass {
            width: 140px;
            height: 180px;
            position: absolute;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: bottom center;
        }

        .glass-left {
            left: 40px;
            transform: rotate(-10deg);
        }

        .glass-right {
            right: 40px;
            transform: rotate(10deg);
        }

        /* Clink Trigger Classes handled via JS thresholds */
        .martini-stage.clinked .glass-left {
            transform: translateX(45px) rotate(18deg);
        }

        .martini-stage.clinked .glass-right {
            transform: translateX(-45px) rotate(-18deg);
        }

        /* Liquid Splatter Drops */
        .splatter {
            position: absolute;
            top: 30px;
            width: 100%;
            height: 100px;
            pointer-events: none;
            opacity: 0;
        }

        .martini-stage.clinked .splatter {
            animation: burst 0.8s ease-out forwards;
            animation-delay: 0.15s;
        }

        @keyframes burst {
            0% { opacity: 0; transform: scale(0.4); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.2) translateY(-30px); }
        }

        .info-line.tagline {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: #000;
            letter-spacing: 7px;
            transition-delay: 0.3s;
        }
    </style>
</head>
<body>

    <div class="scroller-container">
        
        <!-- Camera targets this origin to crash directly into the eye -->
        <div class="hero" id="hero-assets">
            <div class="frame">
                <img class="elk-image" src="https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQNZPEStJGIB2NDSmifGwuFOaOoL7OTrdF3YvNCxyjchsG7RKOxyMfQHl72S0-JqD6kVeff37QWuLzkNfGPH0y-euYwt4tPc55z" alt="MK-ULTRA Elk">
            </div>
            <h1 id="main-title">MK-ULTRA</h1>
        </div>

        <!-- Seamless Macro Eye Canvas Layer -->
        <div class="macro-eye-overlay" id="eye-layer">
            <svg class="macro-eye-svg" viewBox="0 0 200 200">
                <defs>
                    <!-- Surreal organic iris gradients -->
                    <radialGradient id="iris-base" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#8a5329"/>
                        <stop offset="65%" stop-color="#4e2c12"/>
                        <stop offset="100%" stop-color="#150a03"/>
                    </radialGradient>
                    <radialGradient id="glass-sheen" cx="35%" cy="35%" r="40%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                    </radialGradient>
                </defs>
                <!-- Sclera/Surreal Eye Socket Rim -->
                <path d="M20,100 Q100,30 180,100 Q100,170 20,100 Z" fill="#111" stroke="#000" stroke-width="4"/>
                <!-- Glassy Iris -->
                <circle cx="100" cy="100" r="55" fill="url(#iris-base)"/>
                <!-- Iris Texturing/Fibers -->
                <circle cx="100" cy="100" r="45" fill="none" stroke="#311909" stroke-width="3" stroke-dasharray="2, 4"/>
                <circle cx="100" cy="100" r="35" fill="none" stroke="#bc7743" stroke-width="2" stroke-dasharray="4, 2"/>
                <!-- The Eerie Horizontal Prey Pupil unique to Deer/Elk -->
                <rect x="62" y="90" width="76" height="20" rx="10" fill="#000000" id="pupil"/>
                <!-- High-gloss studio reflection overlay -->
                <path d="M60,75 Q100,55 140,75 Q100,70 60,75 Z" fill="url(#glass-sheen)"/>
                <circle cx="130" cy="115" r="8" fill="rgba(255,255,255,0.2)"/>
            </svg>
        </div>

        <!-- Dynamic Text Flow -->
        <div class="info-container" id="text-canvas">
            <div class="info-line" data-reveal="300">BYO</div>
            <div class="info-line" data-reveal="600">MK-ULTRA opening night</div>
            <div class="info-line" data-reveal="900">July 4th</div>
            <div class="info-line" data-reveal="1200">506 S Green Street</div>
        </div>

        <!-- Final Cinematic Universe: Deco Clink & Tagline -->
        <div class="clink-universe" id="clink-zone">
            <div class="martini-stage" id="stage">
                <!-- Liquid Splatter Path -->
                <svg class="splatter" viewBox="0 0 100 100">
                    <circle cx="42" cy="50" r="2.5" fill="#111"/>
                    <circle cx="58" cy="48" r="2" fill="#111"/>
                    <path d="M48,40 Q50,15 53,35 Z" fill="#111"/>
                    <path d="M52,42 Q55,20 57,38 Z" fill="#111"/>
                </svg>

                <!-- Left Art Deco Glass -->
                <svg class="glass glass-left" viewBox="0 0 100 150">
                    <path d="M10,20 L90,20 L53,80 L53,140 L75,140 L75,146 L25,146 L25,140 L47,140 L47,80 Z" fill="none" stroke="#000000" stroke-width="3" stroke-linejoin="miter"/>
                    <!-- Dark Liquid fill line -->
                    <path d="M22,38 L78,38 L50,80 Z" fill="#111111"/>
                    <!-- Deco geometric accent line inside stem -->
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#000" stroke-width="1"/>
                </svg>

                <!-- Right Art Deco Glass -->
                <svg class="glass glass-right" viewBox="0 0 100 150">
                    <path d="M10,20 L90,20 L53,80 L53,140 L75,140 L75,146 L25,146 L25,140 L47,140 L47,80 Z" fill="none" stroke="#000000" stroke-width="3" stroke-linejoin="miter"/>
                    <path d="M22,38 L78,38 L50,80 Z" fill="#111111"/>
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#000" stroke-width="1"/>
                </svg>
            </div>
            <div class="info-line tagline" id="final-tag">The Night Is Still Young...</div>
        </div>

    </div>

    <script>
        const hero = document.getElementById('hero-assets');
        const mainTitle = document.getElementById('main-title');
        const eyeLayer = document.getElementById('eye-layer');
        const textCanvas = document.getElementById('text-canvas');
        const clinkZone = document.getElementById('clink-zone');
        const stage = document.getElementById('stage');
        const finalTag = document.getElementById('final-tag');
        const infoLines = document.querySelectorAll('.info-line:not(.tagline)');
        const pupil = document.getElementById('pupil');

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;

            // Phase 1: Crash zoom directly into the deer's eye
            if (scrollTop <= 1400) {
                // Massive exponential scale to fly straight past the frame into the eye coordinate
                const scale = 1 + (Math.pow(scrollTop, 2.3) * 0.000006);
                const opacity = 1 - (scrollTop * 0.0012);
                
                hero.style.transform = `scale(${scale})`;
                hero.style.filter = `blur(${scrollTop * 0.005}px)`;
                
                // Keep the text title structural opacity clean as we dive past
                mainTitle.style.opacity = 1 - (scrollTop * 0.002);
                textCanvas.style.opacity = 1;
            }

            // Phase 2: Seamless Cross-Fade with the close-up macro eye
            if (scrollTop >= 600 && scrollTop <= 2400) {
                // Eye transitions in as the frame clips out
                const eyeProgress = (scrollTop - 600) / 800; 
                const eyeOpacity = Math.min(Math.max(eyeProgress, 0), 1);
                
                // Subtle zoom matrix on the macro eye to maintain momentum
                const eyeScale = 0.6 + ((scrollTop - 600) * 0.0004);
                
                // Surreal effect: Pupil dilates/constricts slightly based on scroll depth
                const pupilWidth = 76 + ((scrollTop - 600) * 0.015);
                pupil.setAttribute('width', Math.min(pupilWidth, 100));

                eyeLayer.style.opacity = eyeOpacity;
                eyeLayer.style.transform = `scale(${eyeScale})`;
                
                // Gradually fade out macro eye as we transition to the martini finale
                if (scrollTop > 1400) {
                    const fadeOut = 1 - ((scrollTop - 1400) / 600);
                    eyeLayer.style.opacity = Math.max(fadeOut, 0);
                    textCanvas.style.opacity = fadeOut; // clean up early party info
                }
            } else if (scrollTop < 600) {
                eyeLayer.style.opacity = 0;
            }

            // Phase 3: Standard Informational Text Reveals
            infoLines.forEach(line => {
                const targetPoint = parseInt(line.getAttribute('data-reveal'));
                if (scrollTop > targetPoint && scrollTop < 1600) {
                    line.classList.add('reveal');
                } else {
                    line.classList.remove('reveal');
                }
            });

            // Phase 4: The Art Deco Martini Clink Climax
            if (scrollTop >= 2000) {
                clinkZone.classList.add('active');
                
                // Trigger the physics strike exactly when the scroll snaps into the landing zone
                if (scrollTop >= 2300) {
                    stage.classList.add('clinked');
                    finalTag.classList.add('reveal');
                } else {
                    stage.classList.remove('clinked');
                    finalTag.classList.remove('reveal');
                }
            } else {
                clinkZone.classList.remove('active');
                stage.classList.remove('clinked');
                finalTag.classList.remove('reveal');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK-ULTRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            background: radial-gradient(circle, #ffffff 40%, #e2e2e2 100%);
            color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 600vh; /* Smooth, continuous scrolling track */
            overflow-x: hidden;
        }

        /* Fixed viewport container holding our morphing elements */
        .scroller-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            perspective: 1500px;
        }

        /* --- STAGE 1: SQUIGGLY FLANK BUILDINGS --- */
        .skyline-flanks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            overflow: hidden;
        }

        .flank-svg {
            width: 32vw;
            height: 85vh;
            will-change: transform, opacity;
            filter: url(#distort-squiggle); /* Generates the unstable raw squiggle look */
        }

        #left-flank {
            transform: translateX(-100%) scaleX(0.3);
            transform-origin: left bottom;
            fill: none;
            stroke: #111111;
            stroke-width: 2;
        }

        #right-flank {
            transform: translateX(100%) scaleX(0.3);
            transform-origin: right bottom;
            fill: none;
            stroke: #111111;
            stroke-width: 2;
        }

        /* --- STAGE 2: INITIAL GALLERY HERO WALL --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: 48.5% 42.5%; /* Coordinates locked right to the center of the elk's pupil */
            z-index: 2;
            will-change: transform, opacity;
        }

        .frame {
            width: 240px;
            height: 300px;
            background: #ffffff; 
            border: 14px solid #1c120c;
            box-shadow: 0 40px 70px rgba(0,0,0,0.25);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .elk-image {
            width: 110%;
            height: 110%;
            object-fit: contain;
            object-position: bottom center;
            filter: contrast(1.15) brightness(0.9) grayscale(0.15);
            position: absolute;
            bottom: -5px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 14px;
            text-transform: uppercase;
            text-align: center;
            color: #000000;
            will-change: opacity;
        }

        /* --- STAGE 3: HYPER-REALISTIC MICROSCOPIC DEER EYE --- */
        .macro-eye-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.1);
            z-index: 3;
            will-change: opacity, transform;
        }

        .macro-eye-svg {
            width: 120vw;
            height: 120vh;
            max-width: 1500px;
            max-height: 1500px;
        }

        /* --- STAGE 4: SUBTLE RETRO NEON SIGN EYE REFLECTION --- */
        .neon-reflection-wrapper {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: screen; /* Seamlessly projects neon light rays across eyeball tissue */
            will-change: opacity, transform;
        }

        .neon-sign {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 18px;
            text-align: center;
            /* Crimson neon gas core bounded by a high-voltage plasma blue aura */
            color: rgba(255, 35, 35, 0.9);
            text-shadow: 
                0 0 4px rgba(255, 20, 20, 0.9),
                0 0 12px rgba(255, 20, 20, 0.5),
                0 0 22px rgba(0, 90, 255, 0.8),
                0 0 44px rgba(0, 90, 255, 0.5);
            transform: scale(0.85) perspective(600px) rotateX(12deg);
        }

        /* The targeted glitching character "K" */
        .glitch-k {
            display: inline-block;
            animation: voltageDrop 2.8s infinite linear;
        }

        @keyframes voltageDrop {
            0%, 75%, 82%, 88%, 100% { 
                color: rgba(255, 35, 35, 0.9);
                text-shadow: 0 0 4px rgba(255, 20, 20, 0.9), 0 0 22px rgba(0, 90, 255, 0.8);
            }
            76%, 81%, 85% { 
                color: rgba(35, 8, 8, 0.25);
                text-shadow: 0 0 1px rgba(0, 50, 160, 0.2);
            }
            78% {
                color: #ffffff;
                text-shadow: 0 0 10px #00ffea, 0 0 20px #00ffea;
            }
        }

        /* --- STAGE 5: EMERALD LIQUID MARTINI FINALE --- */
        .clink-universe {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 5;
            transform: scale(0.8);
            will-change: opacity, transform;
        }

        .martini-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 500px;
            height: 260px;
            position: relative;
            margin-bottom: 20px;
        }

        .glass {
            width: 150px;
            height: 210px;
            position: absolute;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: bottom center;
        }

        .glass-left { left: 90px; transform: rotate(-14deg); }
        .glass-right { right: 90px; transform: rotate(14deg); }

        /* Snaps stems inward on target contact */
        .martini-stage.clinked .glass-left { transform: translateX(55px) rotate(22deg); }
        .martini-stage.clinked .glass-right { transform: translateX(-55px) rotate(-22deg); }

        /* Dynamic Emerald Splash Physics Fluid paths */
        .emerald-splatter {
            position: absolute;
            top: 25px;
            width: 100%;
            height: 120px;
            pointer-events: none;
            opacity: 0;
            fill: #00ff66;
            filter: drop-shadow(0 0 10px #00ff66);
        }

        .martini-stage.clinked .emerald-splatter {
            animation: liquidEruption 0.7s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
            animation-delay: 0.08s;
        }

        @keyframes liquidEruption {
            0% { opacity: 0; transform: scale(0.4) translateY(20px); }
            35% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.3) translateY(-40px); filter: blur(2px); }
        }

        /* --- DATA TEXT LAYERS --- */
        .info-container {
            position: absolute;
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 28px;
            pointer-events: auto;
            z-index: 6;
        }

        .info-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0;
            filter: blur(20px);
            transform: translateY(50px);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            color: #000000;
        }

        .info-line.reveal { opacity: 1; filter: blur(0px); transform: translateY(0); }

        .tagline {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            letter-spacing: 8px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.85s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            margin-top: 30px;
        }
        .tagline.reveal { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="distort-squiggle">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />

            <filter id="iris-flesh">

    <div class="scroller-container">
        
        <div class="skyline-flanks">

        <div class="hero" id="hero-assets">

                <circle cx="200" cy="200" r="142" fill="none" stroke="#8c5126" stroke-width="5" stroke-dasharray="2, 6" filter="url(#iris-flesh)" opacity="0.8"/>
                <circle cx="200" cy="200" r="118" fill="none" stroke="#bd7846" stroke-width="2.5" stroke-dasharray="4, 3" opacity="0.7"/>
                <circle cx="200" cy="200" r="95" fill="none" stroke="#1f0c02" stroke-width="11" stroke-dasharray="3, 11" filter="url(#iris-flesh)"/>
                
                <rect x="90" y="184" width="220" height="32" rx="16" fill="#000000" id="pupil" />

        </div>

        <div class="neon-reflection-wrapper" id="neon-layer">
            <div class="neon-sign">
                M<span class="glitch-k">K</span>-ULTRA
            </div>
        </div>

        <div class="info-container" id="text-canvas">
            <div class="info-line" data-reveal="200">BYO</div>

            <div class="info-line" data-reveal="1000">July 4th</div>
            <div class="info-line" data-reveal="1400">506 S Green Street</div>
        </div>

        <div class="clink-universe" id="clink-zone">
            <div class="martini-stage" id="stage">
                <svg class="emerald-splatter" viewBox="0 0 100 100">

                    <path d="M22,38 L78,38 L50,80 Z" fill="#00ff66" opacity="0.85" filter="drop-shadow(0 0 6px #00ff66)" />
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#ffffff" stroke-width="1" />

    </div>

    <script>
        const leftFlank = document.getElementById('left-flank');
        const rightFlank = document.getElementById('right-flank');
        const hero = document.getElementById('hero-assets');
        const mainTitle = document.getElementById('main-title');
        const eyeLayer = document.getElementById('eye-layer');
        const neonLayer = document.getElementById('neon-layer');
        const textCanvas = document.getElementById('text-canvas');
        const clinkZone = document.getElementById('clink-zone');
        const stage = document.getElementById('stage');
        const finalTag = document.getElementById('final-tag');
        const infoLines = document.querySelectorAll('.info-line:not(.tagline)');
        const pupil = document.getElementById('pupil');

        let lastKnownScrollPosition = 0;
        let ticking = false;

        // Decouple calculations from direct execution to prevent scroll locking
        window.addEventListener('scroll', () => {
            lastKnownScrollPosition = window.scrollY || document.documentElement.scrollTop;
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    renderTimeline(lastKnownScrollPosition);
                    ticking = false;
                });
                ticking = true;
            }
        });

        function renderTimeline(scrollTop) {
            // TRACK 1: Sideways Squiggle Erection (Scroll 0 - 1400)
            if (scrollTop <= 1400) {
                const f = Math.min(scrollTop / 1000, 1);
                leftFlank.style.transform = `translateX(${-100 + (f * 100)}%) scaleX(${0.3 + (f * 0.7)})`;
                rightFlank.style.transform = `translateX(${100 - (f * 100)}%) scaleX(${0.3 + (f * 0.7)})`;
                
                if (scrollTop > 800) {
                    const fade = 1 - ((scrollTop - 800) / 600);
                    leftFlank.style.opacity = Math.max(fade, 0);
                    rightFlank.style.opacity = Math.max(fade, 0);
                } else {
                    leftFlank.style.opacity = 1;
                    rightFlank.style.opacity = 1;
                }
            }

            // TRACK 2: Linearized Smooth Camera Lens Zoom (No Infinite Breakers)
            if (scrollTop <= 2400) {
                // Smooth linear-quadratic blending prevents value explosion
                const zoomScale = 1 + (scrollTop * 0.0035) + (scrollTop * scrollTop * 0.000015);
                const viewOpacity = scrollTop > 1600 ? 1 - ((scrollTop - 1600) / 600) : 1;
                
                hero.style.transform = `scale(${zoomScale})`;
                hero.style.opacity = Math.max(viewOpacity, 0);
                mainTitle.style.opacity = 1 - (scrollTop * 0.0015);
            }

            // TRACK 3: Seamless Crossfade Microscopic Pupil Core
            if (scrollTop >= 1000 && scrollTop <= 4500) {
                const handoffTrack = (scrollTop - 1000) / 800;
                const eyeOpacity = Math.min(Math.max(handoffTrack, 0), 1);
                const eyeScale = 0.1 + ((scrollTop - 1000) * 0.00045);

                eyeLayer.style.opacity = eyeOpacity;
                eyeLayer.style.transform = `scale(${eyeScale})`;

                // Steady dilation tracking
                const currentPupilWidth = 220 + ((scrollTop - 1000) * 0.02);
                pupil.setAttribute('width', Math.min(currentPupilWidth, 310));

                if (scrollTop > 3400) {
                    const layerFade = 1 - ((scrollTop - 3400) / 700);
                    eyeLayer.style.opacity = Math.max(layerFade, 0);
                    textCanvas.style.opacity = layerFade;
                } else {
                    textCanvas.style.opacity = 1;
                }
            } else if (scrollTop < 1000) {
                eyeLayer.style.opacity = 0;
            }

            // TRACK 4: Ambient Subtle Retro Sign Reflection Overlay
            if (scrollTop >= 1400 && scrollTop <= 4200) {
                const neonOpacity = (scrollTop - 1400) / 600;
                // Hardcap reflectivity at 0.5 to keep it a clean embedded tissue reflection
                neonLayer.style.opacity = Math.min(Math.max(neonOpacity, 0), 0.5); 
                
                const neonScale = 0.75 + ((scrollTop - 1400) * 0.00015);
                neonLayer.style.transform = `scale(${neonScale})`;

                if (scrollTop > 3300) {
                    neonLayer.style.opacity = 0.5 - ((scrollTop - 3300) / 700);
                }
            } else {
                neonLayer.style.opacity = 0;
            }

            // TRACK 5: Sequential Info Text Deployment
            infoLines.forEach(line => {
                const targetPoint = parseInt(line.getAttribute('data-reveal'));
                if (scrollTop > ta

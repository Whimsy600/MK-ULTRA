    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK-ULTRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            background: radial-gradient(circle, #ffffff 40%, #e2e2e2 100%);
            color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 650vh; /* Expansive canvas to track all micro-milestones */
            overflow-x: hidden;
        }

        .scroller-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            perspective: 2000px;
        }

        /* --- SQUIGGLY BUILDING SIDEWAYS ERECTION --- */
        .skyline-flanks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            overflow: hidden;
        }

        .flank-svg {
            width: 35vw;
            height: 85vh;
            will-change: transform, opacity;
            /* Applies continuous structural distortion to generate the "squiggle" look */
            filter: url(#distort-squiggle); 
        }

        #left-flank {
            transform: translateX(-100%) scaleX(0.2);
            transform-origin: left bottom;
            fill: none;
            stroke: #111;
            stroke-width: 2;
        }

        #right-flank {
            transform: translateX(100%) scaleX(0.2);
            transform-origin: right bottom;
            fill: none;
            stroke: #111;
            stroke-width: 2;
        }

        /* --- STAGE 2: INITIAL GALLERY CANVAS --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: 48.5% 42.5%; /* Absolute target coordinate centering the elk's pupil */
            z-index: 2;
            will-change: transform, opacity;
        }

        .frame {
            width: 240px;
            height: 300px;
            background: #ffffff; 
            border: 14px solid #1c120c;
            box-shadow: 0 40px 70px rgba(0,0,0,0.25);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .elk-image {
            width: 110%;
            height: 110%;
            object-fit: contain;
            object-position: bottom center;
            filter: contrast(1.15) brightness(0.9) grayscale(0.15);
            position: absolute;
            bottom: -5px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 14px;
            text-transform: uppercase;
            text-align: center;
            color: #000000;
            transition: opacity 0.1s;
        }

        /* --- STAGE 3: HYPER-REALISTIC MICROSCOPIC EYE LAYER --- */
        .macro-eye-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.18);
            z-index: 3;
            will-change: opacity, transform;
        }

        .macro-eye-svg {
            width: 140vw;
            height: 140vh;
            max-width: 1600px;
            max-height: 1600px;
        }

        /* --- STAGE 4: SUBTLE RETRO NEON SIGN EYE REFLECTION --- */
        .neon-reflection-wrapper {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: screen; /* Fuses the light output directly into the eyeball fibers */
            will-change: opacity, transform;
        }

        .neon-sign {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 18px;
            text-align: center;
            /* Atmospheric realistic retro glow: red baseline core with a deep sapphire blue perimeter gas ring */
            color: rgba(255, 40, 40, 0.85);
            text-shadow: 
                0 0 4px rgba(255, 30, 30, 0.9),
                0 0 10px rgba(255, 30, 30, 0.6),
                0 0 20px rgba(0, 80, 255, 0.8),
                0 0 40px rgba(0, 80, 255, 0.6);
            transform: scale(0.9) perspective(500px) rotateX(10deg); /* Slight curved contour projection */
        }

        /* The Isolated Glitching Target Letter */
        .glitch-target {
            display: inline-block;
            animation: voltageDrop 3.5s infinite linear;
        }

        @keyframes voltageDrop {
            0%, 78%, 84%, 94%, 100% { 
                color: rgba(255, 40, 40, 0.85);
                text-shadow: 0 0 4px rgba(255, 30, 30, 0.9), 0 0 20px rgba(0, 80, 255, 0.8);
            }
            79%, 83%, 91% { 
                color: rgba(40, 10, 10, 0.2);
                text-shadow: 0 0 1px rgba(0, 40, 150, 0.3);
            }
            80% {
                color: #fff;
                text-shadow: 0 0 8px #00fffa, 0 0 15px #00fffa;
            }
        }

        /* --- STAGE 5: CLINK AREA WITH EMERALD STRIKE --- */
        .clink-universe {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 5;
            transform: scale(0.85);
            will-change: opacity, transform;
        }

        .martini-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 500px;
            height: 260px;
            position: relative;
            margin-bottom: 30px;
        }

        .glass {
            width: 160px;
            height: 220px;
            position: absolute;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: bottom center;
        }

        .glass-left { left: 80px; transform: rotate(-15deg); }
        .glass-right { right: 80px; transform: rotate(14deg); }

        .martini-stage.clinked .glass-left { transform: translateX(60px) rotate(24deg); }
        .martini-stage.clinked .glass-right { transform: translateX(-60px) rotate(-24deg); }

        .emerald-splatter {
            position: absolute;
            top: 25px;
            width: 100%;
            height: 120px;
            pointer-events: none;
            opacity: 0;
            fill: #00ff66;
            filter: drop-shadow(0 0 8px #00ff66);
        }

        .martini-stage.clinked .emerald-splatter {
            animation: liquidEruption 0.65s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            animation-delay: 0.1s;
        }

        @keyframes liquidEruption {
            0% { opacity: 0; transform: scale(0.4) translateY(15px); }
            30% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.25) translateY(-35px); filter: blur(2px); }
        }

        /* --- SCROLL INFO MATRIX ELEMENTS --- */
        .info-container {
            position: absolute;
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 28px;
            pointer-events: auto;
            z-index: 6;
        }

        .info-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0;
            filter: blur(20px);
            transform: translateY(50px);
            transition: all 0.75s cubic-bezier(0.16, 1, 0.3, 1);
            color: #000000;
        }

        .info-line.reveal { opacity: 1; filter: blur(0px); transform: translateY(0); }

        .tagline {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            letter-spacing: 8px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            margin-top: 30px;
        }
        .tagline.reveal { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="distort-squiggle">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="iris-flesh">
                <feTurbulence type="turbulence" baseFrequency="0.08" numOctaves="5" result="grain" />
                <feDisplacementMap in="SourceGraphic" in2="grain" scale="9" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div class="scroller-container">
        
        <div class="skyline-flanks">
            <svg id="left-flank" class="flank-svg" viewBox="0 0 150 300">
                <path d="M 10 300 L 10 120 L 45 120 L 45 300 Z" />
                <path d="M 45 300 L 45 40 L 95 40 L 95 300 Z" />
                <path d="M 95 300 L 95 160 L 140 160 L 140 300 Z" />
                <line x1="45" y1="90" x2="95" y2="90" />
                <line x1="45" y1="150" x2="95" y2="150" />
            </svg>
            <svg id="right-flank" class="flank-svg" viewBox="0 0 150 300">
                <path d="M 10 300 L 10 180 L 50 180 L 50 300 Z" />
                <path d="M 50 300 L 50 20 L 105 20 L 105 300 Z" />
                <path d="M 105 300 L 105 100 L 145 100 L 145 300 Z" />
                <line x1="50" y1="70" x2="105" y2="70" />
                <line x1="50" y1="130" x2="105" y2="130" />
            </svg>
        </div>
        
        <div class="hero" id="hero-assets">
            <div class="frame">
                <img class="elk-image" src="https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQNZPEStJGIB2NDSmifGwuFOaOoL7OTrdF3YvNCxyjchsG7RKOxyMfQHl72S0-JqD6kVeff37QWuLzkNfGPH0y-euYwt4tPc55z" alt="MK-ULTRA Elk">
            </div>
            <h1 id="main-title">MK-ULTRA</h1>
        </div>

        <div class="macro-eye-container" id="eye-layer">
            <svg class="macro-eye-svg" viewBox="0 0 400 400">
                <defs>
                    <radialGradient id="hyper-iris" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#6e3f1b"/>
                        <stop offset="30%" stop-color="#4d280f"/>
                        <stop offset="65%" stop-color="#241205"/>
                        <stop offset="90%" stop-color="#0a0501"/>
                        <stop offset="100%" stop-color="#000000"/>
                    </radialGradient>
                </defs>
                
                <circle cx="200" cy="200" r="190" fill="#090503" />
                
                <circle cx="200" cy="200" r="170" fill="url(#hyper-iris)" filter="url(#iris-flesh)" />
                
                <circle cx="200" cy="200" r="140" fill="none" stroke="#8a4f24" stroke-width="5" stroke-dasharray="2, 5" filter="url(#iris-flesh)" opacity="0.8"/>
                <circle cx="200" cy="200" r="115" fill="none" stroke="#ba7542" stroke-width="2.5" stroke-dasharray="4, 2" opacity="0.7"/>
                <circle cx="200" cy="200" r="95" fill="none" stroke="#1c0a01" stroke-width="12" stroke-dasharray="2, 10" filter="url(#iris-flesh)"/>
                <circle cx="200" cy="200" r="80" fill="none" stroke="#945327" stroke-width="1" stroke-dasharray="1, 4" opacity="0.5"/>
                
                <rect x="90" y="184" width="220" height="32" rx="16" fill="#000000" id="pupil" />
                
                <path d="M70,120 Q200,50 330,120 Q200,85 70,120 Z" fill="rgba(255,255,255,0.18)" />
                <circle cx="280" cy="250" r="16" fill="rgba(255,255,255,0.06)" />
                <circle cx="110" cy="260" r="8" fill="rgba(255,255,255,0.04)" />
            </svg>
        </div>

        <div class="neon-reflection-wrapper" id="neon-layer">
            <div class="neon-sign">
                MK-ULT<span class="glitch-target">R</span>A
            </div>
        </div>

        <div class="info-container" id="text-canvas">
            <div class="info-line" data-reveal="300">BYO</div>
            <div class="info-line" data-reveal="700">MK-ULTRA opening night</div>
            <div class="info-line" data-reveal="1100">July 4th</div>
            <div class="info-line" data-reveal="1500">506 S Green Street</div>
        </div>

        <div class="clink-universe" id="clink-zone">
            <div class="martini-stage" id="stage">
                <svg class="emerald-splatter" viewBox="0 0 100 100">
                    <circle cx="46" cy="48" r="3" />
                    <circle cx="54" cy="46" r="2.5" />
                    <circle cx="50" cy="30" r="3.5" />
                    <path d="M46,40 Q50,5 54,36 Z" />
                    <path d="M51,43 Q55,8 58,38 Z" />
                </svg>

                <svg class="glass glass-left" viewBox="0 0 100 150">
                    <path d="M10,20 L90,20 L53,80 L53,140 L75,140 L75,146 L25,146 L25,140 L47,140 L47,80 Z" fill="none" stroke="#ffffff" stroke-width="3" />
                    <path d="M22,38 L78,38 L50,80 Z" fill="#00ff66" opacity="0.85" filter="drop-shadow(0 0 6px #00ff66)" />
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#fff" stroke-width="1" />
                </svg>

                <svg class="glass glass-right" viewBox="0 0 100 150">
                    <path d="M10,20 L90,20 L53,80 L53,140 L75,140 L75,146 L25,146 L25,140 L47,140 L47,80 Z" fill="none" stroke="#ffffff" stroke-width="3" />
                    <path d="M22,38 L78,38 L50,80 Z" fill="#00ff66" opacity="0.85" filter="drop-shadow(0 0 6px #00ff66)" />
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#fff" stroke-width="1" />
                </svg>
            </div>
            <div class="info-line tagline" id="final-tag">The Night Is Still Young...</div>
        </div>

    </div>

    <script>
        const leftFlank = document.getElementById('left-flank');
        const rightFlank = document.getElementById('right-flank');
        const hero = document.getElementById('hero-assets');
        const mainTitle = document.getElementById('main-title');
        const eyeLayer = document.getElementById('eye-layer');
        const neonLayer = document.getElementById('neon-layer');
        const textCanvas = document.getElementById('text-canvas');
        const clinkZone = document.getElementById('clink-zone');
        const stage = document.getElementById('stage');
        const finalTag = document.getElementById('final-tag');
        const infoLines = document.querySelectorAll('.info-line:not(.tagline)');
        const pupil = document.getElementById('pupil');

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;

            // TRACK 1: Horizontal Squiggle Building Erection (0 - 1500)
            if (scrollTop <= 1500) {
                const growthFactor = Math.min(scrollTop / 1100, 1);
                // Moves buildings inward horizontally out from the deep margins
                leftFlank.style.transform = `translateX(${-100 + (growthFactor * 100)}%) scaleX(${0.2 + (growthFactor * 0.8)})`;
                rightFlank.style.transform = `translateX(${100 - (growthFactor * 100)}%) scaleX(${0.2 + (growthFactor * 0.8)})`;
                
                if (scrollTop > 900) {
                    leftFlank.style.opacity = 1 - ((scrollTop - 900) / 600);
                    rightFlank.style.opacity = 1 - ((scrollTop - 900) / 600);
                } else {
                    leftFlank.style.opacity = 1;
                    rightFlank.style.opacity = 1;
                }
            }

            // TRACK 2: Absolute Target Coordinate Precision Zoom (No intermediate fade out)
            if (scrollTop <= 2400) {
                const zoomScale = 1 + (Math.pow(scrollTop, 2.65) * 0.0000025);
                // Retain max visibility right up until the handoff limit to mask transition seams
                const viewOpacity = scrollTop > 1700 ? 1 - ((scrollTop - 1700) / 700) : 1;
                
                hero.style.transform = `scale(${zoomScale})`;
                hero.style.opacity = Math.max(viewOpacity, 0);
                mainTitle.style.opacity = 1 - (scrollTop * 0.0016);
            }

            // TRACK 3: Hyper-Realistic Microscopic Eye Layer Crossfade Placement
            if (scrollTop >= 1200 && scrollTop <= 4600) {
                // Calculation window designed to map the expansion scale to match the background photo perfectly
                const handoffTrack = (scrollTop - 1200) / 800;
                const eyeOpacity = Math.min(Math.max(handoffTrack, 0), 1);
                const eyeScale = 0.18 + ((scrollTop - 1200) * 0.00038);

                eyeLayer.style.opacity = eyeOpacity;
                eyeLayer.style.transform = `scale(${eyeScale})`;

                // Pupil Dilation Velocity Matrix
                const currentPupilWidth = 220 + ((scrollTop - 1200) * 0.015);
                pupil.setAttribute('width', Math.min(currentPupilWidth, 310));

                // Melt everything out smoothly into the final martini horizon
                if (scrollTop > 3600) {
                    const sceneFade = 1 - ((scrollTop - 3600) / 800);
                    eyeLayer.style.opacity = Math.max(sceneFade, 0);
                    textCanvas.style.opacity = sceneFade;
                } else {
                    textCanvas.style.opacity = 1;
                }
            } else if (scrollTop < 1200) {
                eyeLayer.style.opacity = 0;
            }

            // TRACK 4: Ambient Retro Neon Reflection Tracking
            if (scrollTop >= 1600 && scrollTop <= 4400) {
                const reflectionOpacity = (scrollTop - 1600) / 600;
                neonLayer.style.opacity = Math.min(Math.max(reflectionOpacity, 0), 0.55); // Keeps it a subtle reflection
                
                const reflectionScale = 0.75 + ((scrollTop - 1600) * 0.00012);
                neonLayer.style.transform = `scale(${reflectionScale})`;

                if (scrollTop > 3500) {
                    neonLayer.style.opacity = 0.55 - ((scrollTop - 3500) / 800);
                }
            } else {
                neonLayer.style.opacity = 0;
            }

            // TRACK 5: Sequential Info Text Stream Display
            infoLines.forEach(line => {
                const targetPoint = parseInt(line.getAttribute('data-reveal'));

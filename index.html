<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK-ULTRA | The Elk</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. FORCE THE SCROLL TRACK */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* This guarantees a massive scrollable area regardless of browser */
            height: 1000vh; 
            overflow-x: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 2. THE FIXED CAMERA CANVAS */
        #camera-lens {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            perspective: 1000px;
        }

        /* --- SCENE 1: THE ELK & FRAME --- */
        #wood-frame {
            position: absolute;
            width: 300px;
            height: 400px;
            border: 20px solid #3e2723; /* Dark wood frame */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000;
            transform-origin: center center;
            will-change: transform, opacity;
            z-index: 2;
        }

        /* Using a placeholder for your hyper-realistic elk. Swap the src for yours. */
        #elk-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: 50% 40%; /* Anchors the zoom directly on the eye */
        }

        /* --- SCENE 2: SQUIGGLY BUILDINGS --- */
        .building-container {
            position: absolute;
            bottom: 0;
            width: 40vw;
            height: 60vh;
            z-index: 3;
            will-change: transform, opacity;
            opacity: 0;
        }

        #buildings-left { left: 0; transform: translateX(-100%); }
        #buildings-right { right: 0; transform: translateX(100%); }

        .squiggly-line {
            fill: none;
            stroke: #000000;
            stroke-width: 3;
            filter: url(#squiggle-filter);
        }

        /* --- SCENE 3: MACRO BROWN EYE --- */
        #macro-eye {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0502 5%, #3e1f0b 25%, #5c3012 40%, #1a0b04 80%, #000000 100%);
            opacity: 0;
            z-index: 4;
            will-change: opacity;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- SCENE 4: NEON GLOBE REFLECTION --- */
        #neon-reflection {
            position: absolute;
            z-index: 5;
            opacity: 0;
            transform: rotateX(25deg) scale(0.8);
            text-align: center;
            mix-blend-mode: screen;
            will-change: transform, opacity;
        }

        .neon-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 6rem;
            color: rgba(255, 50, 50, 0.9);
            text-shadow: 
                0 0 10px rgba(255, 0, 0, 0.8),
                0 0 20px rgba(255, 0, 0, 0.6),
                0 0 40px rgba(0, 100, 255, 0.6),
                0 0 80px rgba(0, 100, 255, 0.4);
        }

        .glitch-k {
            display: inline-block;
            animation: retroGlitch 3s infinite;
        }

        @keyframes retroGlitch {
            0%, 90%, 96%, 100% { opacity: 1; color: rgba(255, 50, 50, 0.9); text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
            92%, 98% { opacity: 0.3; color: #fff; text-shadow: 0 0 5px #00f; }
            94% { opacity: 0.8; transform: translateX(-3px); }
        }

        /* --- SCENE 5: ART DECO MARTINIS & SPLASH --- */
        #martini-stage {
            position: absolute;
            bottom: 15vh;
            width: 400px;
            height: 250px;
            z-index: 6;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            will-change: opacity;
        }

        .glass {
            width: 120px;
            height: 180px;
            position: absolute;
            will-change: transform;
        }

        /* Art Deco styling for the glasses */
        .glass-path {
            fill: rgba(10, 10, 10, 0.9);
            stroke: #d4af37; /* Gold rim */
            stroke-width: 2;
        }
        .liquid-path { fill: #00ff44; opacity: 0.8; }

        #glass-left { left: 50px; transform: rotate(-15deg); }
        #glass-right { right: 50px; transform: rotate(15deg); }

        #splash-fx {
            position: absolute;
            top: 20px;
            width: 150px;
            height: 150px;
            opacity: 0;
            fill: #00ff44;
            filter: drop-shadow(0 0 10px #00ff44);
            will-change: transform, opacity;
        }
    </style>
</head>
<body>

    <svg style="width:0; height:0; position:absolute;">
        <filter id="squiggle-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div id="camera-lens">
        
        <div id="wood-frame">
            <img id="elk-image" src="https://images.unsplash.com/photo-1605335961623-a607997992cb?q=80&w=600&auto=format&fit=crop" alt="Hyper Realistic Elk">
        </div>

        <div class="building-container" id="buildings-left">
            <svg viewBox="0 0 200 300" width="100%" height="100%">
                <path class="squiggly-line" d="M20,300 L20,150 L60,150 L60,300 M60,300 L60,50 L120,50 L120,300 M120,300 L120,200 L180,200 L180,300" />
            </svg>
        </div>
        <div class="building-container" id="buildings-right">
            <svg viewBox="0 0 200 300" width="100%" height="100%">
                <path class="squiggly-line" d="M180,300 L180,120 L140,120 L140,300 M140,300 L140,80 L80,80 L80,300 M80,300 L80,180 L20,180 L20,300" />
            </svg>
        </div>

        <div id="macro-eye"></div>

        <div id="neon-reflection">
            <h1 class="neon-text">M<span class="glitch-k">K</span>-ULTRA</h1>
        </div>

        <div id="martini-stage">
            <svg id="splash-fx" viewBox="0 0 100 100">
                <circle cx="30" cy="30" r="4" />
                <circle cx="70" cy="25" r="5" />
                <circle cx="50" cy="15" r="3" />
                <path d="M40,50 Q50,20 60,50 Z" />
            </svg>

            <svg id="glass-left" class="glass" viewBox="0 0 100 150">
                <path class="glass-path" d="M10,20 L90,20 L55,70 L55,140 L70,140 L70,145 L30,145 L30,140 L45,140 L45,70 Z" />
                <path class="liquid-path" d="M25,35 L75,35 L50,70 Z" />
            </svg>

            <svg id="glass-right" class="glass" viewBox="0 0 100 150">
                <path class="glass-path" d="M10,20 L90,20 L55,70 L55,140 L70,140 L70,145 L30,145 L30,140 L45,140 L45,70 Z" />
                <path class="liquid-path" d="M25,35 L75,35 L50,70 Z" />
            </svg>
        </div>

    </div>

    <script>
        // DOM Elements
        const frame = document.getElementById('wood-frame');
        const elkImg = document.getElementById('elk-image');
        const bldLeft = document.getElementById('buildings-left');
        const bldRight = document.getElementById('buildings-right');
        const macroEye = document.getElementById('macro-eye');
        const neon = document.getElementById('neon-reflection');
        const martiniStage = document.getElementById('martini-stage');
        const glassLeft = document.getElementById('glass-left');
        const glassRight = document.getElementById('glass-right');
        const splash = document.getElementById('splash-fx');

        // Render loop variables
        let scrollY = 0;
        let ticking = false;

        // Core scroll listener
        window.addEventListener('scroll', () => {
            scrollY = window.scrollY;
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateScene(scrollY);
                    ticking = false;
                });
                ticking = true;
            }
        });

        // The Master Timeline Logic
        function updateScene(y) {
            // Calculate total scroll progress as a percentage from 0.0 to 1.0
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const p = Math.min(y / maxScroll, 1);

            // --- 1. ZOOMING THE ELK & FRAME (Progress: 0.0 -> 0.4) ---
            // Scale goes from 1x to 35x to push inside the eye
            let frameScale = 1;
            if (p < 0.4) {
                frameScale = 1 + (Math.pow(p / 0.4, 3) * 35); 
                frame.style.opacity = 1;
            } else {
                frameScale = 36;
                frame.style.opacity = 0; // Hide it once we are inside
            }
            frame.style.transform = `scale(${frameScale})`;

            // --- 2. SQUIGGLY BUILDINGS DRAW IN (Progress: 0.1 -> 0.3) ---
            if (p > 0.05 && p < 0.4) {
                let buildP = Math.min(Math.max((p - 0.05) / 0.25, 0), 1);
                bldLeft.style.opacity = buildP;
                bldRight.style.opacity = buildP;
                // Move from off-screen to center
                bldLeft.style.transform = `translateX(${-100 + (buildP * 100)}%)`;
                bldRight.style.transform = `translateX(${100 - (buildP * 100)}%)`;
            } else if (p >= 0.4) {
                bldLeft.style.opacity = 0;
                bldRight.style.opacity = 0;
            } else {
                bldLeft.style.opacity = 0;
                bldRight.style.opacity = 0;
            }

            // --- 3. MACRO BROWN EYE FADE IN (Progress: 0.35 -> 0.5) ---
            if (p >= 0.35) {
                let eyeP = Math.min((p - 0.35) / 0.15, 1);
                macroEye.style.opacity = eyeP;
            } else {
                macroEye.style.opacity = 0;
            }

            // --- 4. NEON REFLECTION (Progress: 0.5 -> 0.8) ---
            if (p >= 0.5) {
                let neonP = Math.min((p - 0.5) / 0.15, 1);
                // Keep neon visible for the rest of the scroll
                neon.style.opacity = neonP; 
                // Slight 3D curve adjustment as we settle
                neon.style.transform = `rotateX(${25 - (neonP * 15)}deg) scale(${0.8 + (neonP * 0.2)})`;
            } else {
                neon.style.opacity = 0;
            }

            // --- 5. ART DECO MARTINIS & SPLASH (Progress: 0.75 -> 1.0) ---
            if (p >= 0.75) {
                let stageP = Math.min((p - 0.75) / 0.1, 1);
                martiniStage.style.opacity = stageP;

                // Clink mechanics: Glasses slide towards center
                let clinkP = Math.min(Math.max((p - 0.85) / 0.1, 0), 1);
                
                // Left glass moves right and straightens
                glassLeft.style.transform = `translateX(${clinkP * 40}px) rotate(${-15 + (clinkP * 15)}deg)`;
                // Right glass moves left and straightens
                glassRight.style.transform = `translateX(${-clinkP * 40}px) rotate(${15 - (clinkP * 15)}deg)`;

                // Splash mechanics: Explodes up right as they touch
                if (clinkP > 0.9) {
                    let splashP = (clinkP - 0.9) / 0.1;
                    splash.style.opacity = Math.max(1 - splashP, 0); // Fades out slightly at end
                    splash.style.transform = `scale(${splashP * 1.5}) translateY(${-splashP * 30}px)`;
                } else {
                    splash.style.opacity = 0;
                    splash.style.transform = `scale(0.5) translateY(0)`;
                }

            } else {
                martiniStage.style.opacity = 0;
                splash.style.opacity = 0;
            }
        }
        
        // Initial render
        updateScene(window.scrollY);
    </script>
</body>
</html>

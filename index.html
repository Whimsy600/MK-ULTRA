<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK-ULTRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            background: radial-gradient(circle, #ffffff 40%, #e2e2e2 100%);
            color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 600vh; /* Massive canvas to accommodate the entire hyper-complex timeline */
            overflow-x: hidden;
        }

        .scroller-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            perspective: 2000px;
        }

        /* --- STAGE 1: THE ERRECTING FUTURISTIC CITY --- */
        .skyline-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 4%;
            z-index: 1;
            opacity: 1;
            will-change: transform, opacity;
        }

        .building-cluster {
            width: 300px;
            height: 600px;
            fill: none;
            stroke: #111111;
            stroke-width: 1.5;
            transform-origin: bottom center;
            transform: scaleY(0); /* Starts completely flat, erected via scroll JS */
            will-change: transform;
        }

        /* --- STAGE 2: INITIAL HERO WALL ART --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: 46% 38%; /* Tracks straight to the deer's exact eye coordinates */
            z-index: 2;
            will-change: transform, opacity, filter;
        }

        .frame {
            width: 240px;
            height: 300px;
            background: #ffffff; 
            border: 14px solid #1c120c;
            box-shadow: 0 40px 70px rgba(0,0,0,0.25), inset 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .elk-image {
            width: 110%;
            height: 110%;
            object-fit: contain;
            object-position: bottom center;
            filter: contrast(1.15) brightness(0.9) grayscale(0.15);
            position: absolute;
            bottom: -5px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 14px;
            text-transform: uppercase;
            text-align: center;
            color: #000000;
        }

        /* --- STAGE 3: THE MICROSCOPIC REALISTIC DEER EYE --- */
        .macro-eye-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.3);
            z-index: 3;
            will-change: opacity, transform;
        }

        .macro-eye-svg {
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            max-height: 1200px;
        }

        /* --- STAGE 4: GLITCHING NEON SIGN REFLECTION --- */
        .neon-glitch-title {
            position: absolute;
            font-family: 'Syncopate', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 16px;
            text-align: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            /* White high-intensity neon glare glows */
            text-shadow: 
                0 0 5px #fff, 0 0 10px #fff, 0 0 20px #fff, 
                0 0 40px rgba(255,255,255,0.6), 0 0 80px rgba(255,255,255,0.4);
        }

        /* Hyper-surreal digital glitching animation */
        .glitch-active {
            animation: neonBuzz 0.2s infinite alternate, cyberGlitch 2.5s infinite linear alternate-reverse;
        }

        @keyframes neonBuzz {
            0% { opacity: 0.94; text-shadow: 0 0 4px #fff, 0 0 15px #fff, 0 0 30px rgba(255,255,255,0.5); }
            100% { opacity: 1; text-shadow: 0 0 6px #fff, 0 0 25px #fff, 0 0 50px rgba(255,255,255,0.8); }
        }

        @keyframes cyberGlitch {
            0%, 95%, 100% { transform: skew(0deg) scale(1); filter: blur(0px); }
            96% { transform: skew(-6deg) scaleY(1.05); filter: blur(1px) hue-rotate(90deg); color: #e6e6e6; }
            97% { transform: skew(8deg) scaleX(0.95); text-shadow: -3px 0 #ff00ff, 3px 0 #00ffff; }
            98% { transform: skew(-2deg); text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff; }
            99% { transform: skew(0deg); filter: blur(2px); }
        }

        /* --- STAGE 5: THE EMERALD MARTINI CLINK --- */
        .clink-universe {
            position: absolute;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 6;
            transform: translateY(100px);
            will-change: transform, opacity;
        }

        .martini-stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 500px;
            height: 300px;
            position: relative;
            margin-bottom: 20px;
        }

        .glass {
            width: 180px;
            height: 240px;
            position: absolute;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: bottom center;
        }

        .glass-left { left: 60px; transform: rotate(-14deg); }
        .glass-right { right: 60px; transform: rotate(14deg); }

        /* Executing physical contact trigger layout */
        .martini-stage.clinked .glass-left { transform: translateX(65px) rotate(22deg); }
        .martini-stage.clinked .glass-right { transform: translateX(-65px) rotate(-22deg); }

        /* Radiant Emerald Splash Fluid mechanics */
        .emerald-splatter {
            position: absolute;
            top: 40px;
            width: 100%;
            height: 120px;
            pointer-events: none;
            opacity: 0;
            stroke: #00ff66;
            fill: #00ff66;
            filter: drop-shadow(0 0 10px #00ff66);
        }

        .martini-stage.clinked .emerald-splatter {
            animation: chemicalBurst 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            animation-delay: 0.12s;
        }

        @keyframes chemicalBurst {
            0% { opacity: 0; transform: scale(0.3) translateY(20px); }
            40% { opacity: 1; }
            100% { opacity: 0; transform: scale(1.3) translateY(-40px); filter: blur(3px); }
        }

        /* --- GENERAL TYPOGRAPHY / INFO FLOW --- */
        .info-container {
            position: absolute;
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 28px;
            pointer-events: auto;
            z-index: 4;
        }

        .info-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0;
            filter: blur(20px);
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            color: #000000;
        }

        .info-line.reveal { opacity: 1; filter: blur(0px); transform: translateY(0); }

        .tagline {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.3rem;
            color: #ffffff;
            letter-spacing: 8px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin-top: 40px;
        }
        .tagline.reveal { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="scroller-container">
        
        <div class="skyline-container" id="skyline">
            <svg class="building-cluster" viewBox="0 0 100 200">
                <rect x="5" y="60" width="25" height="140" />
                <rect x="30" y="20" width="35" height="180" />
                <line x1="30" y1="40" x2="65" y2="40" />
                <line x1="30" y1="80" x2="65" y2="80" />
                <rect x="65" y="90" width="30" height="110" />
            </svg>
            <svg class="building-cluster" viewBox="0 0 100 200">
                <rect x="0" y="80" width="30" height="120" />
                <rect x="30" y="40" width="40" height="160" />
                <line x1="33" y1="70" x2="70" y2="70" />
                <line x1="33" y1="110" x2="70" y2="110" />
                <rect x="70" y="10" width="25" height="190" />
            </svg>
        </div>
        
        <div class="hero" id="hero-assets">
            <div class="frame">
                <img class="elk-image" src="https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQNZPEStJGIB2NDSmifGwuFOaOoL7OTrdF3YvNCxyjchsG7RKOxyMfQHl72S0-JqD6kVeff37QWuLzkNfGPH0y-euYwt4tPc55z" alt="MK-ULTRA Elk">
            </div>
            <h1 id="main-title">MK-ULTRA</h1>
        </div>

        <div class="macro-eye-overlay" id="eye-layer">
            <svg class="macro-eye-svg" viewBox="0 0 300 300">
                <defs>
                    <radialGradient id="micro-iris" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#5c3412"/>
                        <stop offset="45%" stop-color="#3d2008"/>
                        <stop offset="75%" stop-color="#211003"/>
                        <stop offset="100%" stop-color="#050200"/>
                    </radialGradient>
                    <filter id="organic-noise">
                        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
                    </filter>
                </defs>
                
                <circle cx="150" cy="150" r="145" fill="#0c0704" />
                <circle cx="150" cy="150" r="130" fill="url(#micro-iris)" filter="url(#organic-noise)" />
                
                <circle cx="150" cy="150" r="110" fill="none" stroke="#78461b" stroke-width="4" stroke-dasharray="1, 6" filter="url(#organic-noise)" opacity="0.7"/>
                <circle cx="150" cy="150" r="90" fill="none" stroke="#a1622f" stroke-width="2" stroke-dasharray="3, 3" opacity="0.6"/>
                <circle cx="150" cy="150" r="75" fill="none" stroke="#1c0d03" stroke-width="8" stroke-dasharray="5, 15" filter="url(#organic-noise)"/>
                
                <rect x="65" y="136" width="170" height="28" rx="14" fill="#000000" id="pupil" />
                
                <path d="M50,90 Q150,40 250,90 Q150,70 50,90 Z" fill="rgba(255,255,255,0.15)" />
                <circle cx="210" cy="190" r="12" fill="rgba(255,255,255,0.08)" />
            </svg>
        </div>

        <div class="neon-glitch-title" id="neon-title">MK-ULTRA</div>

        <div class="info-container" id="text-canvas">
            <div class="info-line" data-reveal="300">BYO</div>
            <div class="info-line" data-reveal="700">MK-ULTRA opening night</div>
            <div class="info-line" data-reveal="1100">July 4th</div>
            <div class="info-line" data-reveal="1500">506 S Green Street</div>
        </div>

        <div class="clink-universe" id="clink-zone">
            <div class="martini-stage" id="stage">
                <svg class="emerald-splatter" viewBox="0 0 100 100">
                    <circle cx="45" cy="50" r="3" />
                    <circle cx="55" cy="48" r="2.5" />
                    <circle cx="50" cy="35" r="4" />
                    <path d="M47,42 Q50,10 54,38 Z" />
                    <path d="M51,45 Q56,15 59,40 Z" />
                </svg>

                <svg class="glass glass-left" viewBox="0 0 100 150">
                    <path d="M10,20 L90,20 L53,80 L53,140 L75,140 L75,146 L25,146 L25,140 L47,140 L47,80 Z" fill="none" stroke="#ffffff" stroke-width="3" />
                    <path d="M22,38 L78,38 L50,80 Z" fill="#00ff66" opacity="0.85" filter="drop-shadow(0 0 5px #00ff66)" />
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#fff" stroke-width="1" />
                </svg>

                <svg class="glass glass-right" viewBox="0 0 100 150">
                    <path d="M10,20 L90,20 L53,80 L53,140 L75,140 L75,146 L25,146 L25,140 L47,140 L47,80 Z" fill="none" stroke="#ffffff" stroke-width="3" />
                    <path d="M22,38 L78,38 L50,80 Z" fill="#00ff66" opacity="0.85" filter="drop-shadow(0 0 5px #00ff66)" />
                    <line x1="50" y1="85" x2="50" y2="135" stroke="#fff" stroke-width="1" />
                </svg>
            </div>
            <div class="info-line tagline" id="final-tag">The Night Is Still Young...</div>
        </div>

    </div>

    <script>
        const skyline = document.getElementById('skyline');
        const buildings = document.querySelectorAll('.building-cluster');
        const hero = document.getElementById('hero-assets');
        const mainTitle = document.getElementById('main-title');
        const eyeLayer = document.getElementById('eye-layer');
        const neonTitle = document.getElementById('neon-title');
        const textCanvas = document.getElementById('text-canvas');
        const clinkZone = document.getElementById('clink-zone');
        const stage = document.getElementById('stage');
        const finalTag = document.getElementById('final-tag');
        const infoLines = document.querySelectorAll('.info-line:not(.tagline)');
        const pupil = document.getElementById('pupil');

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;

            // TRACK 1: Erecting the Skyscrapers
            if (scrollTop <= 1600) {
                const buildingScale = Math.min(scrollTop / 1000, 1);
                buildings.forEach(b => b.style.transform = `scaleY(${buildingScale})`);
                
                // Fade skyline outward seamlessly as camera dives deep past them
                if (scrollTop > 1000) {
                    skyline.style.opacity = 1 - ((scrollTop - 1000) / 600);
                } else {
                    skyline.style.opacity = 1;
                }
            }

            // TRACK 2: Infinite Zoom through Artwork Frame
            if (scrollTop <= 2000) {
                const scale = 1 + (Math.pow(scrollTop, 2.5) * 0.000003);
                const opacity = 1 - (scrollTop * 0.001);
                
                hero.style.transform = `scale(${scale})`;
                hero.style.filter = `blur(${scrollTop * 0.004}px)`;
                mainTitle.style.opacity = 1 - (scrollTop * 0.0015);
                textCanvas.style.opacity = 1;
            }

            // TRACK 3: Crossfade into Macro Microscopic Pupil
            if (scrollTop >= 1000 && scrollTop <= 4200) {
                const eyeProgress = (scrollTop - 1000) / 1000;
                const eyeOpacity = Math.min(Math.max(eyeProgress, 0), 1);
                const eyeScale = 0.3 + ((scrollTop - 1000) * 0.00035);

                eyeLayer.style.opacity = eyeOpacity;
                eyeLayer.style.transform = `scale(${eyeScale})`;

                // Dilation Matrix: Pupil widens slightly under high scroll velocity
                const pupilWidth = 170 + ((scrollTop - 1000) * 0.01);
                pupil.setAttribute('width', Math.min(pupilWidth, 240));

                // Fade out the eye structure to push into final void space
                if (scrollTop > 3200) {
                    const layerFade = 1 - ((scrollTop - 3200) / 800);
                    eyeLayer.style.opacity = Math.max(layerFade, 0);
                    textCanvas.style.opacity = layerFade;
                }
            } else if (scrollTop < 1000) {
                eyeLayer.style.opacity = 0;
            }

            // TRACK 4: Neon Reflection Glitch activation
            if (scrollTop >= 1600 && scrollTop <= 4500) {
                neonTitle.style.opacity = Math.min((scrollTop - 1600) / 500, 1);
                neonTitle.classList.add('glitch-active');
                
                // Keep neon sign locked over the viewport center frame
                const neonScale = 1 + ((scrollTop - 1600) * 0.0001);
                neonTitle.style.transform = `scale(${neonScale})`;

                if (scrollTop > 3800) {
                    neonTitle.style.opacity = 1 - ((scrollTop - 3800) / 700);
                }
            } else {
                neonTitle.style.opacity = 0;
                neonTitle.classList.remove('glitch-active');
            }

            // TRACK 5: Sequential Info Text Reveals
            infoLines.forEach(line => {
                const targetPoint = parseInt(line.getAttribute('data-reveal'));
                if (scrollTop > targetPoint && scrollTop < 2400) {
                    line.classList.add('reveal');
                } else {
                    line.classList.remove('reveal');
                }
            });

            // TRACK 6: Emerald Martini Physics Climax
            if (scrollTop >= 3600) {
                clinkZone.style.opacity = Math.min((scrollTop - 3600) / 600, 1);
                clinkZone.style.transform = `translateY(${Math.max(100 - (scrollTop - 3600) * 0.2, 0)}px)`;
                
                // Precision striking velocity threshold
                if (scrollTop >= 4300) {
                    stage.classList.add('clinked');
                    finalTag.classList.add('reveal');
                } else {
                    stage.classList.remove('clinked');
                    finalTag.classList.remove('reveal');
                }
            } else {
                clinkZone.style.opacity = 0;
                stage.classList.remove('clinked');
                finalTag.classList.remove('reveal');
            }
        });
    </script>
</body>
</html>

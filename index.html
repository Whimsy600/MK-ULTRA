<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK-ULTRA</title>
    <!-- Importing a wide, futuristic, heavy font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            /* Deeper, more clinical shadow vignette for an eerie gallery wall feel */
            background: radial-gradient(circle, #ffffff 40%, #e2e2e2 100%);
            color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 300vh; /* Creates scroll depth */
            overflow-x: hidden;
        }

        /* Fixed container holding the visual elements that morph on scroll */
        .scroller-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            perspective: 1200px;
        }

        /* Hero Section (Elk + Title) */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out, filter 0.1s ease-out;
            will-change: transform, opacity, filter;
        }

        /* Heavy, Realistic Wooden Frame */
        .frame {
            width: 240px;
            height: 300px;
            background: #ffffff; 
            border: 14px solid #1c120c; /* Heavy dark ebony/wood border */
            box-shadow: 
                0 40px 70px rgba(0,0,0,0.25), 
                inset 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 40px;
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }

        /* Realistic Elk Image with an eerie color grade */
        .elk-image {
            width: 110%;
            height: 110%;
            object-fit: contain;
            object-position: bottom center;
            /* Eerie adjustments: slightly cold, desaturated, high shadow contrast */
            filter: contrast(1.15) brightness(0.9) grayscale(0.15) drop-shadow(0px 10px 15px rgba(0,0,0,0.2));
            position: absolute;
            bottom: -5px;
        }

        /* Bold, futuristic title */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 14px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            padding-left: 14px; /* Centers the text properly with letter-spacing */
            color: #000000;
        }

        /* Party Details Container */
        .info-container {
            position: absolute;
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 28px;
            pointer-events: auto;
        }

        /* Individual lines of party info */
        .info-line {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0;
            filter: blur(20px); /* Heavy blur to simulate emerging from a haze */
            transform: translateY(50px) scale(0.93);
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            color: #000000;
        }

        /* Eerie stylized tagline */
        .info-line.tagline {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.1rem;
            color: #666;
            margin-top: 30px;
            letter-spacing: 6px;
        }

        /* Class added via JS when elements enter their scroll threshold */
        .info-line.reveal {
            opacity: 1;
            filter: blur(0px);
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body>

    <!-- Main visual canvas -->
    <div class="scroller-container">
        
        <!-- Hero: Visuals that fade/shrink into the background -->
        <div class="hero" id="hero-assets">
            <div class="frame">
                <!-- Hyper-realistic Elk Mount image from the web -->
                <img class="elk-image" src="https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQNZPEStJGIB2NDSmifGwuFOaOoL7OTrdF3YvNCxyjchsG7RKOxyMfQHl72S0-JqD6kVeff37QWuLzkNfGPH0y-euYwt4tPc55z" alt="MK-ULTRA Elk">
            </div>
            <h1 id="main-title">MK-ULTRA</h1>
        </div>

        <!-- Scroll-revealed Information -->
        <div class="info-container">
            <div class="info-line" data-scroll="300">BYO</div>
            <div class="info-line" data-scroll="600">MK-ULTRA opening night</div>
            <div class="info-line" data-scroll="900">July 4th</div>
            <div class="info-line" data-scroll="1200">506 S Green Street</div>
            <div class="info-line tagline" data-scroll="1500">The Night Is Still Young...</div>
        </div>

    </div>

    <script>
        const hero = document.getElementById('hero-assets');
        const infoLines = document.querySelectorAll('.info-line');

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;

            // 1. Surreal Hero Morph
            // As you scroll, the Elk frame and Title shrink, blur, and melt away into a deep perspective axis
            if (scrollTop <= 1200) {
                const scale = 1 - (scrollTop * 0.00055);
                const opacity = 1 - (scrollTop * 0.0013);
                const blur = scrollTop * 0.02;
                const zTranslation = -scrollTop * 0.6;

                hero.style.transform = `translateZ(${zTranslation}px) scale(${scale})`;
                hero.style.opacity = opacity;
                hero.style.filter = `blur(${blur}px)`;
            } else {
                hero.style.opacity = 0;
            }

            // 2. Controlled Sequential Reveal for Party Info
            infoLines.forEach(line => {
                const triggerPoint = parseInt(line.getAttribute('data-scroll'));
                
                if (scrollTop > triggerPoint) {
                    line.classList.add('reveal');
                } else {
                    line.classList.remove('reveal');
                }
            });
        });
    </script>
</body>
</html>
